[project]
name = "prop-search-core"
version = "2.0.0"
description = "Shared business logic (scrapers, matcher, property types, notifier) for prop-search v2"
requires-python = ">=3.11"
dependencies = [
    "patchright>=1.40",
    "parsel>=1.9",
    "price-parser>=0.3",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["prop_search_core"]
